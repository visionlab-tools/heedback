# Nixpacks config — Heedback API (AdonisJS)
# Coolify: create an Application, set build pack to Nixpacks,
# and paste this TOML in "Custom Nixpacks Config".

providers = ['node']

[phases.setup]
nixPkgs = ['nodejs_22']

[phases.install]
cmds = [
  'corepack enable',
  'corepack prepare pnpm@10.9.0 --activate',
  'pnpm install --frozen-lockfile --filter @heedback/api...',
]

[phases.build]
cmds = ['pnpm --filter @heedback/api build']

[start]
cmd = 'cd packages/api && node build/bin/console.js migration:run --force && node build/bin/server.js'
