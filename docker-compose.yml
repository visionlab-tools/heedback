services:
  # ---------------------------------------------------------------------------
  # AdonisJS API Server
  # ---------------------------------------------------------------------------
  api:
    build:
      context: .
      dockerfile: packages/api/Dockerfile
    ports:
      - '${API_PORT:-3333}:3333'
    environment:
      - NODE_ENV=production
      - APP_KEY=${APP_KEY}
      - HOST=0.0.0.0
      - PORT=3333
      # Database (individual vars for AdonisJS env validation)
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USER=${POSTGRES_USER:-heedback}
      - DB_PASSWORD=${POSTGRES_PASSWORD:-heedback_secret}
      - DB_DATABASE=${POSTGRES_DB:-heedback}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - KURIYR_API_URL=http://kuriyr:4400
      - KURIYR_API_KEY=${KURIYR_API_TOKEN}
      - KURIYR_FROM_NAME=${KURIYR_FROM_NAME:-Heedback}
      - KURIYR_FROM_EMAIL=${KURIYR_FROM_EMAIL:-noreply@heedback.example.com}
      - S3_KEY=${S3_KEY}
      - S3_SECRET=${S3_SECRET}
      - S3_BUCKET=${S3_BUCKET}
      - S3_REGION=${S3_REGION}
      - S3_ENDPOINT=${S3_ENDPOINT}
      - S3_PUBLIC_URL=${S3_PUBLIC_URL}
      - SUPER_ADMIN_EMAIL=${SUPER_ADMIN_EMAIL:-admin@example.com}
      - SUPER_ADMIN_PASSWORD=${SUPER_ADMIN_PASSWORD:-changeme}
      - VAPID_PUBLIC_KEY=${VAPID_PUBLIC_KEY:-}
      - VAPID_PRIVATE_KEY=${VAPID_PRIVATE_KEY:-}
      - VAPID_SUBJECT=${VAPID_SUBJECT:-}
      - FRONTEND_URL=${FRONTEND_URL:-http://localhost:3000}
      - PUBLIC_SITE_URL=${PUBLIC_SITE_URL:-http://localhost:3001}
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://127.0.0.1:3333/health || exit 1']
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Background Scheduler (digest emails every 10 min)
  # ---------------------------------------------------------------------------
  scheduler:
    build:
      context: .
      dockerfile: packages/api/Dockerfile
    command: ['node', 'build/bin/console.js', 'scheduler:run']
    environment:
      - NODE_ENV=production
      - APP_KEY=${APP_KEY}
      - HOST=0.0.0.0
      - PORT=3333
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USER=${POSTGRES_USER:-heedback}
      - DB_PASSWORD=${POSTGRES_PASSWORD:-heedback_secret}
      - DB_DATABASE=${POSTGRES_DB:-heedback}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - KURIYR_API_URL=http://kuriyr:4400
      - KURIYR_API_KEY=${KURIYR_API_TOKEN}
      - KURIYR_FROM_NAME=${KURIYR_FROM_NAME:-Heedback}
      - KURIYR_FROM_EMAIL=${KURIYR_FROM_EMAIL:-noreply@heedback.example.com}
      - FRONTEND_URL=${FRONTEND_URL:-http://localhost:3000}
      - PUBLIC_SITE_URL=${PUBLIC_SITE_URL:-http://localhost:3001}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # SvelteKit Admin Dashboard
  # ---------------------------------------------------------------------------
  web:
    build:
      context: .
      dockerfile: packages/web/Dockerfile
    ports:
      - '${WEB_PORT:-3000}:80'
    environment:
      - API_URL=${API_URL:-http://localhost:3333}
      - WIDGET_URL=${WIDGET_URL:-}
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO /dev/null http://127.0.0.1:80/ || exit 1']
      interval: 15s
      timeout: 10s
      retries: 3
      start_period: 30s
    depends_on:
      - api
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # SvelteKit Public Portal (SSR)
  # ---------------------------------------------------------------------------
  portal:
    build:
      context: .
      dockerfile: packages/portal/Dockerfile
    ports:
      - '${PORTAL_PORT:-3001}:3000'
    environment:
      - NODE_ENV=production
      - API_URL=http://api:3333
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://127.0.0.1:3000/health || exit 1']
      interval: 15s
      timeout: 10s
      retries: 3
      start_period: 30s
    depends_on:
      - api
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # PostgreSQL 16
  # ---------------------------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-heedback}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-heedback_secret}
      - POSTGRES_DB=${POSTGRES_DB:-heedback}
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-heedback}']
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Redis 7
  # ---------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Kuriyr (Transactional Email Service)
  # ---------------------------------------------------------------------------
  kuriyr:
    build:
      context: ./templates/emails
      dockerfile: Dockerfile
    volumes:
      - kuriyr_data:/app/data
    environment:
      - KURIYR_FROM_NAME=${KURIYR_FROM_NAME:-Heedback}
      - KURIYR_FROM_EMAIL=${KURIYR_FROM_EMAIL:-noreply@heedback.example.com}
      - KURIYR_DEFAULT_LOCALE=${DEFAULT_LOCALE:-en}
      - KURIYR_HOST=0.0.0.0
      - KURIYR_PORT=4400
      - KURIYR_SMTP_HOST=${SMTP_HOST:-mailpit}
      - KURIYR_SMTP_PORT=${SMTP_PORT:-1025}
      - KURIYR_SMTP_SECURE=${SMTP_SECURE:-false}
      - KURIYR_SMTP_USER=${SMTP_USER:-}
      - KURIYR_SMTP_PASS=${SMTP_PASS:-}
      - KURIYR_API_TOKEN=${KURIYR_API_TOKEN:-}
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  kuriyr_data:

networks:
  default:
    name: heedback
